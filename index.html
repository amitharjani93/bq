<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Interview Story Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f6f2;--surface:#ffffff;--surface2:#eeece6;--surface3:#e4e1d8;
  --text:#1a1814;--muted:#47443c;--dim:#80786a;--border:rgba(0,0,0,0.1);
  --c1:#c13222;--c2:#9a7200;--c3:#1a7a3a;--c4:#1a52b8;--c5:#6a28d4;--c6:#b84e00;--c7:#0778a0;--c8:#c42470;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f0e17;--surface:#1c1a2e;--surface2:#252340;--surface3:#2e2b50;
    --text:#f4f2ff;--muted:#cac6e8;--dim:#9e9abf;--border:rgba(255,255,255,0.1);
    --c1:#ff7a6b;--c2:#ffd93d;--c3:#7dd98a;--c4:#6aabff;--c5:#d49fff;--c6:#ffb060;--c7:#5dd4f0;--c8:#ff85c8;
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
body{min-height:100dvh;display:flex;flex-direction:column;}

.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.07;animation:drift 16s ease-in-out infinite alternate;}
@media(prefers-color-scheme:dark){.blob{opacity:0.12;}}
.b1{width:500px;height:500px;background:var(--c5);top:-150px;left:-150px;}
.b2{width:350px;height:350px;background:var(--c4);bottom:50px;right:-100px;animation-delay:-6s;}
.b3{width:280px;height:280px;background:var(--c1);top:50%;left:20%;animation-delay:-11s;}
@keyframes drift{from{transform:translate(0,0)scale(1);}to{transform:translate(32px,22px)scale(1.1);}}

.wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;max-width:500px;margin:0 auto;width:100%;padding:0 16px 40px;}

/* HEADER */
.hdr{padding:22px 0 14px;}
.hdr-eye{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.hdr-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;line-height:1.2;}
.hdr-title em{color:var(--c2);font-style:normal;}

/* TOP TOGGLE — By Behavior / All Stories */
.top-toggle{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border-radius:12px;padding:4px;border:1.5px solid var(--border);}
.ttab{flex:1;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:8px 10px;border-radius:9px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;text-align:center;}
.ttab.on{background:var(--c2);color:#1a1814;}
@media(prefers-color-scheme:dark){.ttab.on{color:#0f0e17;}}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;min-height:20px;}
.bc-item{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;padding:0;transition:color .15s;}
.bc-item:hover{color:var(--text);}
.bc-item.active{color:var(--text);cursor:default;}
.bc-sep{color:var(--dim);font-size:12px;}

/* VIEW TRANSITIONS */
.view{transition:opacity .13s;display:none;flex-direction:column;}
.view.active{display:flex;}
.view.fading{opacity:0;}

/* ══════════════════════════════════
   LEVEL 1A — COMPETENCY INDEX
══════════════════════════════════ */
.comp-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
  padding:15px 16px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:14px;margin-bottom:10px;
  -webkit-tap-highlight-color:transparent;
}
.comp-card:active{transform:scale(.98);}
.comp-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.comp-info{flex:1;min-width:0;}
.comp-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;}
.comp-sub{font-size:11.5px;color:var(--muted);line-height:1.4;margin-bottom:6px;}
.comp-companies{display:flex;gap:4px;flex-wrap:wrap;}
.co-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;border:1px solid;letter-spacing:.02em;}
.comp-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.comp-count{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.comp-arrow{color:var(--dim);font-size:18px;}

/* ══════════════════════════════════
   LEVEL 1B — ALL STORIES LIST
══════════════════════════════════ */
.all-story-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
  padding:16px 18px;cursor:pointer;transition:all .2s;margin-bottom:10px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  -webkit-tap-highlight-color:transparent;
}
.all-story-card:active{transform:scale(.98);}
.as-meta{flex:1;min-width:0;}
.as-num{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:var(--dim);letter-spacing:.1em;margin-bottom:5px;}
.as-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px;}
.as-ctx{font-size:12px;color:var(--muted);margin-bottom:8px;}
.as-tags{display:flex;gap:5px;flex-wrap:wrap;}
.as-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:7px;border:1px solid;}
.as-arrow{font-size:18px;color:var(--dim);margin-top:2px;flex-shrink:0;}

/* ══════════════════════════════════
   LEVEL 2 — MAIN STORIES FOR BEHAVIOR
══════════════════════════════════ */
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:14px 16px;border-radius:16px;}
.section-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;line-height:1.3;}
.section-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.co-strip{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}

.main-story-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
  padding:18px;cursor:pointer;transition:all .2s;margin-bottom:12px;
  -webkit-tap-highlight-color:transparent;
}
.main-story-card:active{transform:scale(.98);}
.ms-num{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:var(--dim);letter-spacing:.1em;margin-bottom:5px;}
.ms-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;}
.ms-ctx{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:10px;}
.ms-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.ms-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:7px;border:1px solid;}
.ms-footer{display:flex;align-items:center;justify-content:space-between;}
.ms-hint{font-size:11px;color:var(--dim);}
.ms-hint b{font-weight:700;}
.ms-arrow{font-size:18px;}

/* ══════════════════════════════════
   LEVEL 3 — FLASHCARD DETAIL
══════════════════════════════════ */

/* story identity bar */
.story-id-bar{border-radius:16px;padding:14px 18px;margin-bottom:16px;}
.sid-num{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.12em;margin-bottom:3px;opacity:.7;}
.sid-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;line-height:1.25;margin-bottom:3px;}
.sid-ctx{font-size:12px;opacity:.65;}

/* card selector tabs */
.card-selector{display:flex;gap:0;margin-bottom:16px;background:var(--surface);border-radius:14px;padding:4px;border:1.5px solid var(--border);}
.cstab{flex:1;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;padding:8px 5px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent;line-height:1.35;}
.cstab .cst-main{display:block;font-size:11px;}
.cstab .cst-sub{display:block;font-size:9px;font-weight:400;color:var(--dim);margin-top:1px;}
.cstab.on{background:var(--surface2);color:var(--text);}
.cstab.on .cst-sub{color:var(--muted);}

/* flip card */
.fc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.fc-counter{font-family:'Syne',sans-serif;font-size:11px;color:var(--dim);}
.fc-flip-state{display:flex;align-items:center;gap:5px;font-family:'Syne',sans-serif;font-size:10px;color:var(--dim);letter-spacing:.05em;}
.fc-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);transition:background .2s;}
.fc-dot.on{background:var(--c2);}

.card-scene{perspective:1200px;height:400px;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:16px;}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:22px;padding:24px 22px;
  display:flex;flex-direction:column;
  border:1.5px solid var(--border);
  background:var(--surface);
}
.card-back{transform:rotateY(180deg);overflow-y:auto;}
.card-back::-webkit-scrollbar{width:3px;}
.card-back::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px;}

/* FRONT */
.cf-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.cf-num{font-family:'Syne',sans-serif;font-size:50px;font-weight:800;line-height:1;letter-spacing:-3px;color:rgba(0,0,0,0.1);}
@media(prefers-color-scheme:dark){.cf-num{color:rgba(255,255,255,0.22);}}
.cf-type{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:8px;margin-top:8px;}
.cf-category{display:inline-flex;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:8px;margin-bottom:8px;align-self:flex-start;}
.cf-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.3;color:var(--text);margin-bottom:5px;}
.cf-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
.cf-summary-box{background:var(--surface2);border-radius:13px;padding:13px 15px;flex:1;margin-bottom:13px;}
.cf-summary-label{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.cf-summary-text{font-size:13px;color:var(--muted);line-height:1.65;}
/* followup question box */
.cf-q-box{background:rgba(154,114,0,0.06);border:1px solid rgba(154,114,0,0.2);border-radius:13px;padding:12px 15px;flex:1;margin-bottom:13px;}
@media(prefers-color-scheme:dark){.cf-q-box{background:rgba(255,217,61,0.07);border-color:rgba(255,217,61,0.2);}}
.cf-q-label{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--c2);margin-bottom:6px;}
.cf-q-text{font-size:13px;color:var(--muted);line-height:1.65;font-style:italic;}
.cf-tags{display:flex;flex-wrap:wrap;gap:5px;}
.cf-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:8px;border:1px solid;}

/* BACK */
.cb-header{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.star-pills-row{display:flex;gap:4px;}
.spill{font-family:'Syne',sans-serif;font-size:9px;font-weight:800;padding:3px 7px;border-radius:6px;}
.sp-s{background:rgba(106,40,212,0.1);color:#6a28d4;}
.sp-t{background:rgba(26,82,184,0.1);color:#1a52b8;}
.sp-a{background:rgba(26,122,58,0.1);color:#1a7a3a;}
.sp-r{background:rgba(154,114,0,0.12);color:#9a7200;}
@media(prefers-color-scheme:dark){
  .sp-s{background:rgba(199,125,255,.2);color:#d49fff;}
  .sp-t{background:rgba(77,150,255,.2);color:#6aabff;}
  .sp-a{background:rgba(107,203,119,.2);color:#7dd98a;}
  .sp-r{background:rgba(255,217,61,.2);color:#ffd93d;}
}
.star-block{margin-bottom:14px;}
.star-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.star-badge{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;padding:3px 10px;border-radius:6px;}
.sb-s{background:rgba(106,40,212,0.08);color:#6a28d4;}
.sb-t{background:rgba(26,82,184,0.08);color:#1a52b8;}
.sb-a{background:rgba(26,122,58,0.08);color:#1a7a3a;}
.sb-r{background:rgba(154,114,0,0.1);color:#9a7200;}
@media(prefers-color-scheme:dark){
  .sb-s{background:rgba(199,125,255,.15);color:#d49fff;}
  .sb-t{background:rgba(77,150,255,.15);color:#6aabff;}
  .sb-a{background:rgba(107,203,119,.15);color:#7dd98a;}
  .sb-r{background:rgba(255,217,61,.15);color:#ffd93d;}
}
.star-lbl{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;}
.star-text{font-size:13px;color:var(--muted);line-height:1.68;}
.divider{height:1px;background:var(--border);margin:3px 0 14px;}
.key-quote{background:var(--surface2);border-left:3px solid var(--c2);border-radius:0 12px 12px 0;padding:11px 14px;font-size:13px;font-style:italic;color:var(--muted);line-height:1.6;margin-top:2px;}

/* confetti */
.cp{position:fixed;pointer-events:none;animation:cf 1.2s ease-in forwards;z-index:999;}
@keyframes cf{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(150px) rotate(450deg);opacity:0;}}
</style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-eye">week 1 · behavioral prep</div>
    <div class="hdr-title">Interview <em>Story Bank</em></div>
  </div>

  <!-- top-level toggle: only visible at level 1 -->
  <div class="top-toggle" id="top-toggle">
    <button class="ttab on" onclick="setRootTab('behaviors')">By Behavior</button>
    <button class="ttab" onclick="setRootTab('all')">All Stories</button>
  </div>

  <!-- breadcrumb -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- views -->
  <div id="view-behaviors" class="view active"></div>
  <div id="view-all" class="view"></div>
  <div id="view-stories" class="view"></div>
  <div id="view-detail" class="view"></div>
</div>

<script>
/* ═══════════════════════════════
   COLOR MODE HELPERS
   Dark-mode colours are vivid/pastel (readable on dark bg).
   Light-mode colours are the darker equivalents (readable on white).
═══════════════════════════════ */
const darkToLight = {
  "#4d96ff":"#1a52b8","rgba(77,150,255,0.12)":"rgba(26,82,184,0.09)","rgba(77,150,255,0.1)":"rgba(26,82,184,0.07)",
  "#c77dff":"#6a28d4","rgba(199,125,255,0.12)":"rgba(106,40,212,0.09)","rgba(199,125,255,0.1)":"rgba(106,40,212,0.07)",
  "#ffd93d":"#8a6200","rgba(255,217,61,0.12)":"rgba(138,98,0,0.1)","rgba(255,217,61,0.1)":"rgba(138,98,0,0.08)",
  "#6bcb77":"#1a7a3a","rgba(107,203,119,0.12)":"rgba(26,122,58,0.09)","rgba(107,203,119,0.1)":"rgba(26,122,58,0.07)",
  "#ff6b6b":"#b82a1a","rgba(255,107,107,0.12)":"rgba(184,42,26,0.09)","rgba(255,107,107,0.1)":"rgba(184,42,26,0.07)",
  "#ff9f43":"#b84e00","rgba(255,159,67,0.12)":"rgba(184,78,0,0.09)","rgba(255,159,67,0.1)":"rgba(184,78,0,0.07)",
  "#48dbfb":"#0778a0","rgba(72,219,251,0.12)":"rgba(7,120,160,0.09)","rgba(72,219,251,0.1)":"rgba(7,120,160,0.07)",
  "#ff6bb5":"#b8186e","rgba(255,107,181,0.12)":"rgba(184,24,110,0.09)","rgba(255,107,181,0.1)":"rgba(184,24,110,0.07)",
};
function isDark(){return window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches;}
function tc(val){if(isDark())return val;return darkToLight[val]||val;}

// Re-render on system theme change
if(window.matchMedia){window.matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>render());}

/* ═══════════════════════════════
   DATA
═══════════════════════════════ */
const competencies = [
  {id:"uncertainty",name:"Shipping Under Uncertainty",desc:"Making defensible calls when data is incomplete or time is short",icon:"🚀",color:"#4d96ff",bg:"rgba(77,150,255,0.12)",companies:["Amazon: Bias for Action","Google: Ambiguity","Meta: Drive Results","Microsoft: Adaptability"]},
  {id:"influence",name:"Indirect Influence",desc:"Moving teams and decisions without direct authority",icon:"🧲",color:"#c77dff",bg:"rgba(199,125,255,0.12)",companies:["Amazon: Have Backbone","Google: Leadership","Meta: Collaboration","Microsoft: Influencing for Impact","Uber: Champion the Mission"]},
  {id:"conviction",name:"Conviction vs Data",desc:"When your gut conflicts with the numbers — and what you do about it",icon:"⚖️",color:"#ffd93d",bg:"rgba(255,217,61,0.12)",companies:["Amazon: Dive Deep","Google: Data-Driven","Netflix: Judgment","Microsoft: Judgment"]},
  {id:"ownership",name:"Ownership & Accountability",desc:"Taking responsibility end-to-end, beyond your job description",icon:"🎯",color:"#6bcb77",bg:"rgba(107,203,119,0.12)",companies:["Amazon: Ownership","Google: Googleyness","Uber: Be an Owner","Salesforce: Trailblazer","Microsoft: Drive for Results"]},
  {id:"killing",name:"Killing a Feature / Project",desc:"Stopping investment when evidence says stop — and defending that call",icon:"🔪",color:"#ff6b6b",bg:"rgba(255,107,107,0.12)",companies:["Amazon: Frugality","Netflix: Informed Captain","Google: Impact at Scale","Microsoft: Judgment"]},
  {id:"stakeholder",name:"Stakeholder Management",desc:"Aligning people with competing priorities across functions and levels",icon:"🤝",color:"#ff9f43",bg:"rgba(255,159,67,0.12)",companies:["Amazon: Earn Trust","Meta: Resolve Conflicts","Microsoft: One Microsoft","Salesforce: Collaborate","Uber: Build the Ecosystem"]},
  {id:"privacy",name:"Trust, Safety & Privacy",desc:"Navigating risk, compliance, and responsible product decisions",icon:"🔐",color:"#48dbfb",bg:"rgba(72,219,251,0.12)",companies:["Amazon: Earn Trust","Microsoft: Customer Obsession","Google: Do the Right Thing","Salesforce: Trust (Core Value #1)"]},
  {id:"pivot",name:"Strategic Pivot",desc:"Responding to a major market shift or leadership direction change",icon:"🔄",color:"#ff6bb5",bg:"rgba(255,107,181,0.12)",companies:["Amazon: Think Big","Google: Innovation","Netflix: Adaptability","Microsoft: Growth Mindset","Uber: Champion the Mission"]}
];

const mainStories = [
  {
    id:"ms1",num:"Story 01",
    title:"Dynamic Tool Discovery",
    ctx:"Declarative agents · MCP · Microsoft 365",
    competencies:["uncertainty","influence","privacy","stakeholder"],
    color:"#4d96ff",bg:"rgba(77,150,255,0.1)",
    tags:[{label:"shipping under uncertainty",color:"#4d96ff",bg:"rgba(77,150,255,0.12)"},{label:"privacy & safety",color:"#48dbfb",bg:"rgba(72,219,251,0.12)"},{label:"stakeholder alignment",color:"#c77dff",bg:"rgba(199,125,255,0.12)"}],
    summary:"Canva, Monday, HubSpot needed agents to dynamically discover tools without republishing. V1 excluded this. 2-month deadline. Privacy & security nightmare — no blueprint existed.",
    star:{
      s:"Canva, Monday, HubSpot were blocked — they needed declarative agents to dynamically discover new tools from MCP servers without republishing. V1 had intentionally excluded this. Customer and partner pressure was high.",

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let S = {
  level: 1,          // 1=root, 2=behavior stories, 3=detail
  rootTab: "behaviors", // "behaviors" | "all"
  compId: null,
  storyId: null,
  cardIdx: 0,        // which card in detail (0=main, 1=fu1, 2=fu2)
  flipped: false
};

/* ═══════════════════════════════
   NAVIGATE
═══════════════════════════════ */
function go(patch) {
  const views = ["view-behaviors","view-all","view-stories","view-detail"];
  views.forEach(v => document.getElementById(v).classList.add("fading"));
  setTimeout(() => {
    S = {...S, ...patch};
    render();
    views.forEach(v => document.getElementById(v).classList.remove("fading"));
  }, 110);
}

function setRootTab(tab) {
  S.rootTab = tab;
  // update toggle buttons
  document.querySelectorAll(".ttab").forEach((b,i)=>{
    b.classList.toggle("on",(tab==="behaviors"&&i===0)||(tab==="all"&&i===1));
  });
  document.getElementById("view-behaviors").classList.toggle("active", tab==="behaviors");
  document.getElementById("view-all").classList.toggle("active", tab==="all");
  if(tab==="behaviors") renderBehaviors();
  else renderAll();
  renderBreadcrumb();
}

/* ═══════════════════════════════
   MASTER RENDER
═══════════════════════════════ */
function render() {
  // toggle visibility
  document.getElementById("view-behaviors").classList.toggle("active", S.level===1 && S.rootTab==="behaviors");
  document.getElementById("view-all").classList.toggle("active", S.level===1 && S.rootTab==="all");
  document.getElementById("view-stories").classList.toggle("active", S.level===2);
  document.getElementById("view-detail").classList.toggle("active", S.level===3);
  document.getElementById("top-toggle").style.display = S.level===1 ? "flex" : "none";

  renderBreadcrumb();
  if(S.level===1 && S.rootTab==="behaviors") renderBehaviors();
  if(S.level===1 && S.rootTab==="all") renderAll();
  if(S.level===2) renderStories();
  if(S.level===3) renderDetailView();
}

/* ═══════════════════════════════
   BREADCRUMB
═══════════════════════════════ */
function renderBreadcrumb() {
  const bc = document.getElementById("breadcrumb");
  const comp = competencies.find(c=>c.id===S.compId);
  const story = mainStories.find(s=>s.id===S.storyId);
  let parts = [];
  if(S.level===1){
    parts=[`<span class="bc-item active">${S.rootTab==="behaviors"?"Behaviors":"All Stories"}</span>`];
  } else if(S.level===2){
    parts=[
      `<button class="bc-item" onclick="go({level:1,rootTab:'behaviors'})">Behaviors</button>`,
      `<span class="bc-sep">›</span>`,
      `<span class="bc-item active" style="color:${tc(comp.color)}">${comp.name}</span>`
    ];
  } else if(S.level===3){
    if(S.compId){
      parts=[
        `<button class="bc-item" onclick="go({level:1,rootTab:'behaviors'})">Behaviors</button>`,
        `<span class="bc-sep">›</span>`,
        `<button class="bc-item" onclick="go({level:2,storyId:null,cardIdx:0,flipped:false})" style="color:${tc(comp.color)}">${comp.name}</button>`,
        `<span class="bc-sep">›</span>`,
        `<span class="bc-item active">${story.title}</span>`
      ];
    } else {
      parts=[
        `<button class="bc-item" onclick="go({level:1,rootTab:'all'})">All Stories</button>`,
        `<span class="bc-sep">›</span>`,
        `<span class="bc-item active">${story.title}</span>`
      ];
    }
  }
  bc.innerHTML = parts.join("");
}

/* ═══════════════════════════════
   LEVEL 1A — BEHAVIOR INDEX
═══════════════════════════════ */
function renderBehaviors() {
  document.getElementById("view-behaviors").innerHTML = competencies.map(c=>{
    const count = mainStories.filter(s=>s.competencies.includes(c.id)).length;
    const col=tc(c.color),bg=tc(c.bg);
    return `
    <div class="comp-card" onclick="go({level:2,compId:'${c.id}',storyId:null,cardIdx:0,flipped:false});confetti()">
      <div class="comp-icon" style="background:${bg};">${c.icon}</div>
      <div class="comp-info">
        <div class="comp-name">${c.name}</div>
        <div class="comp-sub">${c.desc}</div>
        <div class="comp-companies">${c.companies.map(co=>`<span class="co-badge" style="color:${col};border-color:${col}44;background:${bg};">${co}</span>`).join("")}</div>
      </div>
      <div class="comp-right">
        <span class="comp-count" style="background:${bg};color:${col};">${count} ${count===1?"story":"stories"}</span>
        <span class="comp-arrow">›</span>
      </div>
    </div>`;
  }).join("");
}

/* ═══════════════════════════════
   LEVEL 1B — ALL STORIES
═══════════════════════════════ */
function renderAll() {
  document.getElementById("view-all").innerHTML = mainStories.map(s=>{
    const col=tc(s.color),bg=tc(s.bg);
    return `
    <div class="all-story-card" onclick="go({level:3,storyId:'${s.id}',compId:null,cardIdx:0,flipped:false});confetti()" style="border-color:${col}33;">
      <div class="as-meta">
        <div class="as-num">${s.num}</div>
        <div class="as-title">${s.title}</div>
        <div class="as-ctx">${s.ctx}</div>
        <div class="as-tags">${s.tags.map(t=>`<span class="as-tag" style="color:${tc(t.color)};background:${tc(t.bg)};border-color:${tc(t.color)}44;">${t.label}</span>`).join("")}</div>
      </div>
      <span class="as-arrow" style="color:${col};">›</span>
    </div>`;
  }).join("");
}

/* ═══════════════════════════════
   LEVEL 2 — MAIN STORIES LIST
═══════════════════════════════ */
function renderStories() {
  const comp = competencies.find(c=>c.id===S.compId);
  const filtered = mainStories.filter(s=>s.competencies.includes(S.compId));
  const ccol=tc(comp.color),cbg=tc(comp.bg);
  document.getElementById("view-stories").innerHTML = `
    <div class="section-head" style="background:${cbg};">
      <div class="section-icon" style="background:rgba(0,0,0,0.1);">${comp.icon}</div>
      <div>
        <div class="section-title" style="color:${ccol};">${comp.name}</div>
        <div class="section-desc">${comp.desc}</div>
        <div class="co-strip">${comp.companies.map(co=>`<span class="co-badge" style="color:${ccol};border-color:${ccol}44;background:${cbg};">${co}</span>`).join("")}</div>
      </div>
    </div>
    ${filtered.map(s=>{
      const scol=tc(s.color),sbg=tc(s.bg);
      return `
    <div class="main-story-card" onclick="go({level:3,storyId:'${s.id}',cardIdx:0,flipped:false});confetti()" style="border-color:${scol}33;">
      <div class="ms-num">${s.num}</div>
      <div class="ms-title">${s.title}</div>
      <div class="ms-ctx">${s.ctx}</div>
      <div class="ms-tags">${s.tags.map(t=>`<span class="ms-tag" style="color:${tc(t.color)};background:${tc(t.bg)};border-color:${tc(t.color)}44;">${t.label}</span>`).join("")}</div>
      <div class="ms-footer">
        <div class="ms-hint">🔁 <b>${s.followups.length} follow-up${s.followups.length!==1?"s":""}</b> inside</div>
        <span class="ms-arrow" style="color:${scol};">›</span>
      </div>
    </div>`;
    }).join("")}`;
}

/* ═══════════════════════════════
   LEVEL 3 — FLASHCARD DETAIL
═══════════════════════════════ */
function renderDetailView() {
  const story = mainStories.find(s=>s.id===S.storyId);
  const scol=tc(story.color), sbg=tc(story.bg);
  const allCards = [
    {type:"main", data: story},
    ...story.followups.map(fu=>({type:"followup", data:fu}))
  ];
  const active = allCards[S.cardIdx];
  const total = allCards.length;

  // selector tabs
  const tabsHtml = allCards.map((c,i)=>`
    <button class="cstab ${i===S.cardIdx?"on":""}" onclick="selectCard(${i})">
      <span class="cst-main">${i===0?"Main Story":c.data.label}</span>
      <span class="cst-sub">${i===0?"your answer":"interviewer asks"}</span>
    </button>`).join("");

  // front content
  let frontContent = "";
  if(active.type==="main"){
    frontContent = `
      <div class="cf-top">
        <div class="cf-num">${story.num.replace("Story ","")}</div>
        <div class="cf-type" style="background:${sbg};color:${scol};">Main Story</div>
      </div>
      <span class="cf-category" style="background:${sbg};color:${scol};">Overview</span>
      <div class="cf-title">${story.title}</div>
      <div class="cf-sub">${story.ctx}</div>
      <div class="cf-summary-box">
        <div class="cf-summary-label">summary</div>
        <div class="cf-summary-text">${story.summary}</div>
      </div>
      <div class="cf-tags">${story.tags.map(t=>`<span class="cf-tag" style="color:${tc(t.color)};background:${tc(t.bg)};border-color:${tc(t.color)}44;">${t.label}</span>`).join("")}</div>`;
  } else {
    const fu = active.data;
    frontContent = `
      <div class="cf-top">
        <div class="cf-num" style="font-size:36px;" class="cf-num">${fu.label}</div>
        <div class="cf-type" style="background:rgba(154,114,0,0.1);color:var(--c2);">Probe</div>
      </div>
      <span class="cf-category" style="background:rgba(154,114,0,0.08);color:var(--c2);">Interviewer Follow-up</span>
      <div class="cf-title">${fu.title}</div>
      <div class="cf-q-box">
        <div class="cf-q-label">they asked</div>
        <div class="cf-q-text">"${fu.question}"</div>
      </div>
      <div class="cf-summary-box" style="flex:0;">
        <div class="cf-summary-label">your approach</div>
        <div class="cf-summary-text">${fu.summary}</div>
      </div>`;
  }

  // back STAR content
  const starData = active.type==="main" ? story.star : active.data.star;
  const quoteData = active.type==="main" ? story.quote : active.data.quote;

  const backContent = `
    <div class="cb-header">
      <span style="font-size:13px;font-weight:700;">${active.type==="main"?story.title:active.data.title}</span>
      <div class="star-pills-row">
        <span class="spill sp-s">S</span><span class="spill sp-t">T</span>
        <span class="spill sp-a">A</span><span class="spill sp-r">R</span>
      </div>
    </div>
    <div class="star-block">
      <div class="star-row"><span class="star-badge sb-s">S</span><span class="star-lbl">Situation</span></div>
      <div class="star-text">${starData.s.replace(/\n/g,"<br>")}</div>
    </div>
    <div class="divider"></div>
    <div class="star-block">
      <div class="star-row"><span class="star-badge sb-t">T</span><span class="star-lbl">Task</span></div>
      <div class="star-text">${starData.t.replace(/\n/g,"<br>")}</div>
    </div>
    <div class="divider"></div>
    <div class="star-block">
      <div class="star-row"><span class="star-badge sb-a">A</span><span class="star-lbl">Action</span></div>
      <div class="star-text">${starData.a.replace(/\n/g,"<br>")}</div>
    </div>
    <div class="divider"></div>
    <div class="star-block">
      <div class="star-row"><span class="star-badge sb-r">R</span><span class="star-lbl">Result</span></div>
      <div class="star-text">${starData.r.replace(/\n/g,"<br>")}</div>
    </div>
    <div class="divider"></div>
    <div class="key-quote">"${quoteData}"</div>`;

  document.getElementById("view-detail").innerHTML = `
    <div class="story-id-bar" style="background:${sbg};">
      <div class="sid-num" style="color:${scol};">${story.num}</div>
      <div class="sid-title">${story.title}</div>
      <div class="sid-ctx">${story.ctx}</div>
    </div>

    <div class="card-selector">${tabsHtml}</div>

    <div class="fc-meta">
      <span class="fc-counter">${S.cardIdx+1} / ${total} · ${S.flipped?"STAR breakdown":"overview"}</span>
      <div class="fc-flip-state">
        <div class="fc-dot ${!S.flipped?"on":""}"></div>
        <div class="fc-dot ${S.flipped?"on":""}"></div>
      </div>
    </div>

    <div class="card-scene" id="card-scene" onclick="flipCard()">
      <div class="card-inner ${S.flipped?"flipped":""}" id="card-inner">
        <div class="card-face card-front">${frontContent}</div>
        <div class="card-face card-back">${backContent}</div>
      </div>
    </div>`;

  // swipe to change card
  let tx=0,ty=0;
  const scene = document.getElementById("card-scene");
  scene.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  scene.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
      if(dx<0&&S.cardIdx<total-1) selectCard(S.cardIdx+1);
      else if(dx>0&&S.cardIdx>0) selectCard(S.cardIdx-1);
    } else if(Math.abs(dx)<15&&Math.abs(dy)<15){
      flipCard();
    }
  },{passive:true});
}

function flipCard() {
  S.flipped = !S.flipped;
  const inner = document.getElementById("card-inner");
  if(inner) inner.classList.toggle("flipped", S.flipped);
  // update meta
  const meta = document.querySelector(".fc-meta .fc-counter");
  const story = mainStories.find(s=>s.id===S.storyId);
  const total = 1 + story.followups.length;
  if(meta) meta.textContent = `${S.cardIdx+1} / ${total} · ${S.flipped?"STAR breakdown":"overview"}`;
  document.querySelectorAll(".fc-dot").forEach((d,i)=>d.classList.toggle("on",(i===0&&!S.flipped)||(i===1&&S.flipped)));
  if(S.flipped) confetti();
}

function selectCard(idx) {
  S.cardIdx = idx;
  S.flipped = false;
  renderDetailView();
}

/* ═══════════════════════════════
   CONFETTI
═══════════════════════════════ */
function confetti(){
  const cols=["#ffd93d","#ff6b6b","#6bcb77","#4d96ff","#c77dff","#ff9f43"];
  for(let i=0;i<14;i++){
    const e=document.createElement("div");
    e.className="cp";
    e.style.cssText=`left:${10+Math.random()*80}%;top:28%;width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?"50%":"3px"};animation-delay:${Math.random()*.45}s;`;
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),1600);
  }
}

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
render();
</script>
</body>
</html>
